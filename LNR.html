<script language="JavaScript">

// Funktion zum Einfügen des aktuellen Datums im Format TT.MM.JJJJ
window.addEventListener('load', () => {
    const inputFeld = document.getElementById('ort-datum');
    
    // Wir warten 200ms, damit der LocalStorage (loadFormData) sicher fertig ist
    setTimeout(() => {
        const gespeicherterWert = localStorage.getItem('ort-datum');

        // Nur wenn im LocalStorage NICHTS steht oder das Feld leer ist
        if (!gespeicherterWert || inputFeld.value.trim() === "") {
            const jetzt = new Date();
            
            // Führende Nullen erzwingen (06.03.2026)
            const tag = String(jetzt.getDate()).padStart(2, '0');
            const monat = String(jetzt.getMonth() + 1).padStart(2, '0');
            const jahr = jetzt.getFullYear();
            
            const datumFormatiert = `${tag}.${monat}.${jahr}`;
            
            // Wert setzen
            inputFeld.value = `Regensburg / ${datumFormatiert}`;
            
            // Sofort im LocalStorage speichern
            localStorage.setItem('ort-datum', inputFeld.value);
            console.log("Standard-Datum gesetzt: " + inputFeld.value);
        }
    }, 200); 
});

const formulas = new Map();
let activeInput = null;
const numpad = document.getElementById('numpad');

// 1. TASTATUR-STEUERUNG (PC-Support)
document.addEventListener('keydown', (event) => {
    // Nur reagieren, wenn ein Numpad-Feld aktiv ist
    if (!activeInput) return;

    // TAB-Taste abfangen
    if (event.key === 'Tab') {
        event.preventDefault(); // Verhindert das Springen in "weit entfernte" Zellen
        handleTab();
        return;
    }

    // ENTER-Taste zum Abschließen
    if (event.key === 'Enter') {
        event.preventDefault();
        closeNumpad();
        return;
    }

    // ESC-Taste zum Abbrechen
    if (event.key === 'Escape') {
        numpad.style.display = 'none';
        calculateAndFormat(activeInput);
        activeInput.blur();
        activeInput = null;
    }
});

// Synchronisierung bei direkter Tastatureingabe (PC-Tastatur)
document.addEventListener('input', (event) => {
    if (event.target.classList.contains('numpad-input')) {
        // 1. Die neue Formel in der Map speichern
        formulas.set(event.target, event.target.value);
        
        // 2. Das große Display im Numpad aktualisieren
        updateNumpadDisplay();
        
        // 3. Falls es nur eine Zahl ist, die Summen unten neu berechnen
        updateTableSums();
    }
});


// 2. KLICK-STEUERUNG (Maus/Touch/Fokus)
document.addEventListener('click', (event) => {
    const isInput = event.target.classList.contains('numpad-input');
    const isNumpad = numpad.contains(event.target);

    if (isInput) {
        // Falls vorher ein anderes Feld aktiv war, dieses berechnen
        if (activeInput && activeInput !== event.target) {
            calculateAndFormat(activeInput);
        }
        
        activeInput = event.target;

        // Formel laden, falls vorhanden
        if (formulas.has(activeInput)) {
            activeInput.value = formulas.get(activeInput);
        }

        // 1. Numpad anzeigen
        numpad.style.display = 'block';
        updateNumpadDisplay();

        // 2. ZEILE AUTOMATISCH INS SICHTFELD SCROLLEN
        // 'smooth' sorgt für ein sanftes Gleiten, 'end' orientiert sich am unteren Rand (plus CSS-Margin)
        setTimeout(() => {
            activeInput.scrollIntoView({ behavior: 'smooth', block: 'end' });
        }, 100); // Kleiner Timeout, damit das Numpad erst eingeblendet wird

        // Fokus setzen
        activeInput.focus();
        const laenge = activeInput.value.length;
        activeInput.setSelectionRange(laenge, laenge);

    } else if (!isNumpad && activeInput) {
        closeNumpad();
    }
});


// Hilfsfunktion: Aktualisiert das große Sichtfeld im Numpad
function updateNumpadDisplay() {
    const display = document.getElementById('numpad-display');
    if (activeInput && display) {
        // Formel aus der Map holen, sonst den aktuellen Feldwert nehmen
        const formel = formulas.get(activeInput) || activeInput.value;
        display.innerText = formel || " "; // Leerzeichen verhindert Springen des Layouts
    }
}

function addChar(char) {
    if (activeInput) {
        activeInput.value += char;
        // Sofort in der Map und im Display speichern
        formulas.set(activeInput, activeInput.value);
        localStorage.setItem(activeInput.id || activeInput.name, activeInput.value);
        
        updateNumpadDisplay();
        
        activeInput.focus();
        const laenge = activeInput.value.length;
        activeInput.setSelectionRange(laenge, laenge);
    }
}

function deleteChar() {
    if (activeInput) {
        activeInput.value = activeInput.value.slice(0, -1);
        formulas.set(activeInput, activeInput.value);
        localStorage.setItem(activeInput.id || activeInput.name, activeInput.value);
        
        updateNumpadDisplay();
        
        activeInput.focus();
        const laenge = activeInput.value.length;
        activeInput.setSelectionRange(laenge, laenge);
    }
}

// Funktion zum Laden aus localStorage
function loadFormData() {
    const inputs = document.querySelectorAll('input, textarea');
    inputs.forEach(input => {
        // WICHTIG: Das Datei-Feld ("file") darf niemals automatisch befüllt werden
        if (input.type === "file") return;

        const savedValue = localStorage.getItem(input.id || input.name);
        if (savedValue !== null && !input.readOnly) {
            input.value = savedValue;
            
            if (input.classList.contains('numpad-input')) {
                formulas.set(input, savedValue);
                calculateAndFormat(input);
            }
        }
    });
    updateTableSums();
}



// Beim Laden der Seite ausführen
window.addEventListener('load', loadFormData);

// Funktion zum Speichern localStorage
document.addEventListener('input', (event) => {
    const target = event.target;
    if (target.id || target.name) {
        localStorage.setItem(target.id || target.name, target.value);
    }
});



function calculateAndFormat(inputField) {
    if (!inputField) return;
    let rawValue = inputField.value;
    if (rawValue) {
        try {
            // Komma zu Punkt, x zu * für die JS-Berechnung
            let formula = rawValue.replace(/,/g, '.').replace(/x/g, '*');
            let result = eval(formula);
            if (!isNaN(result)) {
                // Ergebnis runden und Punkt zurück zu Komma
                inputField.value = result.toString().replace(/\./g, ',');
            }
        } catch (e) {
            console.log("Formel unvollständig");
        }
    }
    updateTableSums();
}

function closeNumpad() {
    if (activeInput) {
        calculateAndFormat(activeInput);
        activeInput.blur();
        activeInput = null;
    }
    numpad.style.display = 'none';
}

function handleTab() {
    const inputs = Array.from(document.querySelectorAll('.numpad-input'));
    let index = inputs.indexOf(activeInput);
    
    if (index !== -1) {
        calculateAndFormat(activeInput);
        let next = inputs[(index + 1) % inputs.length];
        if (next) {
            next.focus();
            next.click(); // Triggert den Listener für Formel-Modus
        }
    }
}

function updateTableSums() {
    const rows = document.querySelectorAll('.table-section tbody tr');
    const columnIds = [
        { index: 3, id: 'sum-meter' }, { index: 4, id: 'sum-bogen' },
        { index: 5, id: 'sum-passl' }, { index: 6, id: 'sum-aussch' },
        { index: 7, id: 'sum-endst' }, { index: 8, id: 'sum-trichter' },
        { index: 9, id: 'sum-stutzen' }, { index: 10, id: 'sum-armatur' },
        { index: 11, id: 'sum-extra' }
    ];

    columnIds.forEach(col => {
        let total = 0;
        rows.forEach(row => {
            const input = row.cells[col.index]?.querySelector('input');
            if (input && input.value) {
                // Wir wandeln Komma in Punkt um und versuchen die Zahl zu lesen
                // Falls noch eine Formel im Feld steht, wird sie hier ignoriert,
                // bis silentCalculate() sie beim Laden in eine Zahl umgewandelt hat.
                let val = parseFloat(input.value.replace(/,/g, '.'));
                if (!isNaN(val)) {
                    total += val;
                }
            }
        });

        const footerCell = document.getElementById(col.id);
        if (footerCell) {
            // Ergebnis runden (2 Nachkommastellen) und Punkt wieder zu Komma
            footerCell.innerText = (Math.round(total * 100) / 100).toString().replace(/\./g, ',');
        }
    });
}


// Funktion zum Leeren des Blattes und des localStorage
function clearAllFields() {
    if (confirm("Möchten Sie wirklich alle Eingaben löschen?")) {
        // 1. LocalStorage komplett bereinigen
        localStorage.clear();

        // 2. Alle relevanten Eingabefelder im Dokument finden
        const inputs = document.querySelectorAll('input, textarea');
        
        inputs.forEach(field => {
            // Schreibgeschützte Felder (wie das berechnete Datum) überspringen
            if (field.readOnly || field.type === "file") return;

            // Feld leeren
            field.value = "";

            // Falls es ein Numpad-Feld ist, auch die interne Formel-Map löschen
            if (field.classList.contains('numpad-input') && typeof formulas !== 'undefined') {
                formulas.delete(field);
            }
        });

        // 3. Summen in der Tabelle auf 0 setzen
        if (typeof updateTableSums === 'function') {
            updateTableSums();
        }

        // 4. Das Standard-Datum wieder einsetzen (da wir oben alles gelöscht haben)
        const dateField = document.getElementById('ort-datum');
        if (dateField) {
            const jetzt = new Date();
            const tag = String(jetzt.getDate()).padStart(2, '0');
            const monat = String(jetzt.getMonth() + 1).padStart(2, '0');
            const jahr = jetzt.getFullYear();
            dateField.value = `Regensburg / ${tag}.${monat}.${jahr}`;
            localStorage.setItem('ort-datum', dateField.value);
        }


    }
}



// 1. HILFSFUNKTION: Generiert den Dateinamen aus Feldern + Datum
function getGeneratedFileName() {
    const bau = document.getElementById('bauvorhaben').value.trim() || "Projekt";
    const ort = document.getElementById('leistungsort').value.trim() || "Ort";
    const jetzt = new Date();
    const datum = String(jetzt.getDate()).padStart(2, '0') + "-" + 
                  String(jetzt.getMonth() + 1).padStart(2, '0') + "-" + 
                  jetzt.getFullYear();
    
    // Erzeugt z.B. "Hausbau_Regensburg_06-03-2026.lnr"
    return `LNR-${bau}_${ort}_${datum}.lnr`.replace(/[/\\?%*:|"<>\s]/g, '_');
}

// 2. SPEICHERN: Erstellt die CSV mit Semikolon und Zeilenumbrüchen
async function saveAsLNR() {
    let csvRows = [];
    const allInputs = document.querySelectorAll('input, textarea');

    allInputs.forEach(input => {
        if (!input.id || input.id === "fileInput") return;
        
        // Formel aus Map holen oder normalen Wert nutzen
        let val = (input.classList.contains('numpad-input') && formulas.has(input))
            ? formulas.get(input)
            : input.value;

        // CSV-Safe Formatierung
        let escaped = '"' + String(val).replace(/"/g, '""') + '"';
        csvRows.push(`${input.id};${escaped}`);
    });

    // Zeilenumbrüche mit \r\n für Windows/Excel-Kompatibilität
    const csvContent = csvRows.join("\r\n");
    const fileName = getGeneratedFileName();

    // 1. Versuch: Moderner "Speichern unter"-Dialog (PC)
    if ('showSaveFilePicker' in window) {
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: fileName,
                types: [{
                    description: 'LNR Datei',
                    accept: { 'application/octet-stream': ['.lnr'] }
                }],
            });
            const writable = await handle.createWritable();
            await writable.write(csvContent);
            await writable.close();
            return; 
        } catch (err) {
            console.log("Speichern abgebrochen oder Fehler:", err);
            if (err.name === 'AbortError') return;
        }
    }

    // 2. Fallback: Mobilgeräte & Safari
    // 'application/octet-stream' verhindert oft das Anhängen von .txt
    const blob = new Blob([csvContent], { type: 'application/octet-stream' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
    URL.revokeObjectURL(link.href);
}



// 3. LADEN: Verarbeitet die Datei
function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const lines = e.target.result.split(/\r?\n/);

        lines.forEach(line => {
            if (!line.includes(';')) return;
            const parts = line.split(';');
            const id = parts[0];
            let value = parts.slice(1).join(';').replace(/^"|"$/g, '').replace(/""/g, '"');

            const field = document.getElementById(id);
            if (field) {
                field.value = value;
                if (field.classList.contains('numpad-input')) {
                    formulas.set(field, value);
                    silentCalculate(field);
                }
                localStorage.setItem(id, value);
            }
        });
        updateTableSums();
        event.target.value = ""; 
    };
    reader.readAsText(file);
}

// Hilfsfunktion für das Laden
function silentCalculate(inputField) {
    let rawValue = inputField.value;
    if (rawValue) {
        try {
            let formula = rawValue.replace(/,/g, '.').replace(/x/g, '*');
            let result = eval(formula);
            if (!isNaN(result)) {
                inputField.value = result.toString().replace(/\./g, ',');
            }
        } catch (e) { console.log("Rechenfehler beim Laden"); }
    }
}

// Zentrale Funktion für haptisches Feedback
function triggerFeedback() {
    if (navigator.vibrate) {
        navigator.vibrate(15); // Kurzer 15ms Impuls (Android)
    }
}

// Optional: Automatische Zuweisung an alle Buttons im Grid
document.querySelectorAll('.numpad-grid button').forEach(button => {
    button.addEventListener('touchstart', triggerFeedback, {passive: true});
});

// Drucknamen erstellung und print to pdf
function starteDruck() {
    const element = document.body; // Oder deine Formular-ID
    const lnrValue = document.getElementById('lnr').value || "unbekannt";

    const opt = {
      margin: 10,
      filename: `Leistungsnachweis_Nr-${lnrValue}.pdf`,
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    // Erzeugt das PDF lokal auf dem Handy
    html2pdf().set(opt).from(element).save();
}

function starteDruck() {
    const lnrInput = document.getElementById('lnr');
    const lnrValue = lnrInput?.value?.trim() || "unbekannt";
    
    // 1. Titel VOR dem Druckaufruf ändern
    const originalTitle = document.title;
    document.title = `Leistungsnachweis_Nr-${lnrValue}`;

    // 2. Drucken auslösen
    window.print();

    // 3. Titel nach einer kurzen Verzögerung zurücksetzen
    // (Mobilgeräte brauchen oft einen Moment, um den Titel zu erfassen)
    setTimeout(() => {
        document.title = originalTitle;
    }, 1000);
}



// 4. PWA DATEI-HANDLER & Service Worker immer unten im Script
if ('launchQueue' in window) {
    window.launchQueue.setConsumer(async (launchParams) => {
        if (launchParams.files.length > 0) {
            const file = await launchParams.files[0].getFile();
            const mockEvent = { target: { files: [file] } };
            handleFileSelect(mockEvent);
        }
    });
