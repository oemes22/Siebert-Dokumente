<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sibert-Isolierungen</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon-192.png">
	
<style>
  :root {
    --primary-text: #000000;
    --btn-text: #0046b8;
    --bg-card: rgba(255, 255, 255, 0.9);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 60px;
    color: var(--primary-text);
	
/* --- EXTRA FEINES TECHNIK-RASTER (SCROLLBAR) --- */
background: 
    /* 1. Haupt-Raster (alle 50px - Deutliche Linien) */
    linear-gradient(rgba(255,255,255,0.3) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.3) 1px, transparent 1px),
    /* 2. Mittel-Raster (alle 25px - Mittlere Linien) */
    linear-gradient(rgba(255,255,255,0.15) 0.8px, transparent 0.8px),
    linear-gradient(90deg, rgba(255,255,255,0.15) 0.8px, transparent 0.8px),
    /* 3. Fein-Raster (alle 5px - Millimeter-Optik) */
    linear-gradient(rgba(255,255,255,0.08) 0.5px, transparent 0.5px),
    linear-gradient(90deg, rgba(255,255,255,0.08) 0.5px, transparent 0.5px),
    /* 4. Dein originaler bunter Hintergrundverlauf */
radial-gradient(
  circle at left top,
  rgba(255, 50, 50, 0.6) 0%,   /* Vibrantes, aber weicheres Rot */
  rgba(255, 215, 0, 0.5) 8%,   /* Gold-Gelb (weniger "Neon") */
  rgba(46, 204, 113, 0.4) 15%, /* Smaragdgrün */
  rgba(41, 128, 185, 0.6) 45%, /* Sattes Ocean-Blau */
  rgba(15, 15, 25, 1) 100%     /* Sehr dunkles Blau-Schwarz */
);

/* Die kleineren Größen für das feine Gitter */
background-size: 50px 50px, 50px 50px, 25px 25px, 25px 25px, 5px 5px, 5px 5px, 100% 100%;

/* WICHTIG: background-attachment: scroll sorgt dafür, dass das Gitter mitwandert */
background-attachment: scroll; 
/* ------------------------------------------- */
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 900;
    margin-bottom: 5px;
    background: linear-gradient(135deg, #000000, #1a2a3a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p {
    font-weight: 700;
    margin-bottom: 50px;
    font-size: 1.1rem;
  }

  ul {
    list-style: none;
    padding: 0;
    width: 90%;
    max-width: 380px;
  }

  li { margin-bottom: 18px; }

  a {
    display: block;
    background: var(--bg-card);
    backdrop-filter: blur(10px);
    color: var(--btn-text);
    padding: 22px;
    border-radius: 18px;
    text-decoration: none;
    font-weight: 800;
    text-align: center;
    border: 2px solid #000000;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
  }

  a:hover {
    background: #ffffff;
    color: #000;
	
  }
  
  #std-icon-link {
  position: fixed;
  top: 15px;
  right: 15px;
  width:  40px;
  height: 40px;
  padding: 0;         
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.2rem;
  border-radius: 50%;   
  z-index: 1000;        /* Immer im Vordergrund */
  box-shadow: 0 10px 30px #ffffbf;
  background: transparent;
  backdrop-filter: blur(10px);
  border: none;
  text-decoration: none;
}

#std-icon-link:hover {
  background: transparent;
  transform: scale(1.2); /* Kleiner Vergrößerungs-Effekt */
}

#version-container {
  margin-top: auto;      /* Schiebt den Container ganz nach unten */
  padding: 20px;
  font-size: 0.6rem;
  color: white;
  width: 100%;           /* Nutzt die volle Breite */
  text-align: right;     /* Richtet den Text innerhalb rechts aus */
  box-sizing: border-box; /* Verhindert Overlap durch Padding */
}
</style>
</head>
<body>

    <a href="STD.html" id="std-icon-link" title="Stundenzettel">🕒</a>
    <h1>Siebert-Isolierungen</h1>
    <p>Bitte wähle eine Vorlage aus:</p>

    <ul>
        <li><a href="LNR.html">Leistungsnachweis (Rohre) 📏</a></li>
		<li><a href="LNZ.html">Leistungsnachweis (Regie) ⏳</a></li>
		<li><a href="LNL.html">Leistungsnachweis (Lüftungskanal) 🔳</a></li>
        <li><a href="Kappenaufmaß.html">Kappenaufmaß 🔘</a></li>
		<li><a href="Bedarfsrechner.html">Bedarfsrechner 🥣🧱</a></li>
    </ul>
	
    <div id="version-container">
     <p>Version: <span id="app-version">Laden...</span></p> 
    </div>

<script>  
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        const bwChannel = new BroadcastChannel('sw_status');
        const display = document.getElementById('app-version');

        // Empfang der Version vom Service Worker
        bwChannel.onmessage = (event) => {
            if (event.data.type === 'VERSION_INFO') {
                display.innerText = event.data.version;
                console.log('Version vom SW erhalten:', event.data.version);
            }
        };

        navigator.serviceWorker.register('./sw.js')
        .then(reg => {
            console.log('Service Worker registriert!');
            // Nach Registrierung Version anfragen
            setTimeout(() => {
                bwChannel.postMessage({ type: 'GET_VERSION' });
            }, 500);
        })
        .catch(err => {
            display.innerText = "Fehler";
            console.error('SW-Fehler:', err);
        });
    });
}

// 4. PWA DATEI-HANDLER & Service Worker immer unten im Script
if ('launchQueue' in window) {
    window.launchQueue.setConsumer(async (launchParams) => {
        if (launchParams.files.length > 0) {
            const file = await launchParams.files[0].getFile();
            const mockEvent = { target: { files: [file] } };
            handleFileSelect(mockEvent);
        }
    });
}

// PWA Teilen für Android (Übersichtsseite mit automatischer Weiterleitung)
const bwChannel = new BroadcastChannel('sw_status');

bwChannel.onmessage = (event) => {
    if (event.data.type === 'SHARE_FILE_RECEIVED') {
        const file = event.data.file;
        const fileName = event.data.fileName.toLowerCase();

        console.log(`Datei empfangen: ${fileName}. Leite weiter...`);

        // Mapping: Welche Endung gehört zu welcher Seite?
        let targetPage = "";
        if (fileName.endsWith('.lnr')) targetPage = "LNR.html";
        else if (fileName.endsWith('.lnz')) targetPage = "LNZ.html";
        else if (fileName.endsWith('.lnl')) targetPage = "LNL.html";
        else if (fileName.endsWith('.stdz')) targetPage = "STD.html";
        else if (fileName.endsWith('.ka')) targetPage = "Kappenaufmaß.html";

        if (targetPage) {
            // Wir speichern die Datei kurz im Cache oder IndexDB, 
            // aber am einfachsten: Wir leiten weiter. 
            // Der Service Worker wird die Datei beim Laden der Zielseite erneut senden.
            window.location.href = targetPage;
        } else {
            alert("Unbekanntes Dateiformat: " + fileName);
        }
    }
};

</script>

</body>
</html>
