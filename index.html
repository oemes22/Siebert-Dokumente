<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sibert-Isolierungen</title>
		<!-- Anfang Verknüpfung zum Web App Manifest -->
    <link rel="manifest" href="manifest.json">
    <!-- Optimierung für iOS (Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon-192.png">
	<!-- Ende Verknüpfung zum Web App Manifest -->
	
<style>
  :root {
    --primary-text: #000000; /* Maximaler Kontrast */
    --btn-text: #0046b8;    /* Dunkleres, kräftiges Blau für die Links */
    --bg-card: rgba(255, 255, 255, 0.9); /* Fast deckendes Weiß für Lesbarkeit */
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 60px;
    color: var(--primary-text);
    
    /* Dein kräftiger Kugel-Farbverlauf */
    background: radial-gradient(
      circle at left top,
      rgba(255, 0, 0, 0.5) 0%,
      rgba(255, 255, 0, 1) 5%,  /* Korrigiert auf 1 (Maximum) */
      rgba(0, 255, 0, 0.5) 10%,
      rgba(0, 0, 255, 0.5) 40%,
	  rgba(0, 0, 255, 1  ) 100%
    );
    background-attachment: fixed;
    background-color: #ffffff;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 900; /* Extra fett */
    margin-bottom: 5px;
    /* Dunklerer Verlauf für die Schrift, damit sie auf Gelb/Rot knallt */
    background: linear-gradient(135deg, #000000, #1a2a3a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 4px rgba(255,255,255,0.5)); /* Leichter Lichtsaum zur Trennung */
  }

  p {
    font-weight: 700; /* Schrift dicker für besseren Kontrast */
    margin-bottom: 50px;
    font-size: 1.1rem;
    color: #000;
  }

  ul {
    list-style: none;
    padding: 0;
    width: 90%;
    max-width: 380px;
  }

  li {
    margin-bottom: 18px;
  }

  a {
    display: block;
    background: var(--bg-card); /* Viel helleres Weiß */
    backdrop-filter: blur(10px);
    color: var(--btn-text);
    padding: 22px;
    border-radius: 18px;
    text-decoration: none;
    font-weight: 800; /* Sehr fett für Lesbarkeit */
    text-align: center;
    border: 2px solid #000000; /* Schwarzer Rahmen für harten Kontrast */
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
  }

  a:hover {
    transform: translateY(-3px) scale(1.02);
    background: #ffffff;
    color: #000; /* Text wird beim Hover schwarz */
    border-color: #2f7dfa;
  }

  a:active {
    transform: translateY(0);
  }
</style>






</head>
<body>

    <h1>Siebert-Isolierungen</h1>
    <p>Bitte wähle eine Vorlage aus:</p>

    <ul>
        <li>
            <a href="LNR.html">Leistungsnachweis Rohre</a>
        </li>
        <li>
            <a href="Kappenaufmaß.html">Kappenaufmaß</a>
        </li>
    </ul>

<script language="JavaScript">  

// Dieses Script immer als letztes im Scriptblock
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registriert!'))
        .catch(err => console.log('Service Worker Fehler:', err));
    });
}

</script>

</body>
</html>
