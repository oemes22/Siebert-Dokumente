<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sibert-Isolierungen</title>
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link rel="apple-touch-icon" href="icon-192.png">
	
<style>
  :root {
    --primary-text: #000000;
    --btn-text: #0046b8;
    --bg-card: rgba(255, 255, 255, 0.9);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 60px;
    color: var(--primary-text);
    background: radial-gradient(
      circle at left top,
      rgba(255, 0, 0, 0.5) 0%,
      rgba(255, 255, 0, 1) 5%,
      rgba(0, 255, 0, 0.5) 10%,
      rgba(0, 0, 255, 0.5) 40%,
	  rgba(0, 0, 255, 1) 100%
    );
    background-attachment: fixed;
  }

  h1 {
    font-size: 2.2rem;
    font-weight: 900;
    margin-bottom: 5px;
    background: linear-gradient(135deg, #000000, #1a2a3a);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p {
    font-weight: 700;
    margin-bottom: 50px;
    font-size: 1.1rem;
  }

  ul {
    list-style: none;
    padding: 0;
    width: 90%;
    max-width: 380px;
  }

  li { margin-bottom: 18px; }

  a {
    display: block;
    background: var(--bg-card);
    backdrop-filter: blur(10px);
    color: var(--btn-text);
    padding: 22px;
    border-radius: 18px;
    text-decoration: none;
    font-weight: 800;
    text-align: center;
    border: 2px solid #000000;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    transition: all 0.3s ease;
  }

  a:hover {
    background: #ffffff;
    color: #000;
  }

  #version-container {
    margin-top: auto;
    padding: 20px;
    font-size: 0.9rem;
    opacity: 0.8;
  }
</style>
</head>
<body>

    <h1>Siebert-Isolierungen</h1>
    <p>Bitte wähle eine Vorlage aus:</p>

    <ul>
        <li><a href="LNR.html">Leistungsnachweis Rohre</a></li>
		<li><a href="LNZ.html">Leistungsnachweis (Regie)</a></li>
        <li><a href="Kappenaufmaß.html">Kappenaufmaß</a></li>
    </ul>
	
    <div id="version-container">
     <p>Version: <span id="app-version">Laden...</span></p> 
    </div>

<script>  
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        const bwChannel = new BroadcastChannel('sw_status');
        const display = document.getElementById('app-version');

        // Empfang der Version vom Service Worker
        bwChannel.onmessage = (event) => {
            if (event.data.type === 'VERSION_INFO') {
                display.innerText = event.data.version;
                console.log('Version vom SW erhalten:', event.data.version);
            }
        };

        navigator.serviceWorker.register('./sw.js')
        .then(reg => {
            console.log('Service Worker registriert!');
            // Nach Registrierung Version anfragen
            setTimeout(() => {
                bwChannel.postMessage({ type: 'GET_VERSION' });
            }, 500);
        })
        .catch(err => {
            display.innerText = "Fehler";
            console.error('SW-Fehler:', err);
        });
    });
}
</script>

</body>
</html>
