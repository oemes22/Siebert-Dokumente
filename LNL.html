<script language="JavaScript">

const pageNamespace = "leistungsnachweis_zeit";  // Zuweisung für den Lokal Storage für jede Seite änderm.

// 2. Zentrale Speicher-Funktion mit Namespace
function saveToPageStorage(key, value) {
    localStorage.setItem(pageNamespace + "_" + key, value);
}

// Funktion zum Einfügen des aktuellen Datums im Format TT.MM.JJJJ
window.addEventListener('load', () => {
    const inputFeld = document.getElementById('ort-datum');
    
    // Wir warten 200ms, damit der LocalStorage (loadFormData) sicher fertig ist
    setTimeout(() => {
        const gespeicherterWert = localStorage.getItem('ort-datum');

        // Nur wenn im LocalStorage NICHTS steht oder das Feld leer ist
        if (!gespeicherterWert || inputFeld.value.trim() === "") {
            const jetzt = new Date();
            
            // Führende Nullen erzwingen (06.03.2026)
            const tag = String(jetzt.getDate()).padStart(2, '0');
            const monat = String(jetzt.getMonth() + 1).padStart(2, '0');
            const jahr = jetzt.getFullYear();
            
            const datumFormatiert = `${tag}.${monat}.${jahr}`;
            
            // Wert setzen
            inputFeld.value = `Regensburg / ${datumFormatiert}`;
            
            // Sofort im LocalStorage speichern
            localStorage.setItem('ort-datum', inputFeld.value);
            console.log("Standard-Datum gesetzt: " + inputFeld.value);
        }
    }, 200); 
});


// Funktion zum Laden aus localStorage
function loadFormData() {
    const inputs = document.querySelectorAll('input, textarea');
    inputs.forEach(input => {
        if (input.type === "file") return;

const savedValue = localStorage.getItem(pageNamespace + "_" + (input.id || input.name));


        if (savedValue !== null && !input.readOnly) {
            input.value = savedValue;
        }
    });
}




// Beim Laden der Seite ausführen
window.addEventListener('load', loadFormData);

// Funktion zum Speichern localStorage
document.addEventListener('input', (event) => {
    const target = event.target;
    if (target.id || target.name) {
   
        saveToPageStorage((target.id || target.name), target.value);
    }
});


// Funktion zum Leeren NUR der felder dieses Namespaces im Lokal Storage
function clearAllFields() {
    if (confirm("Möchten Sie wirklich alle Eingaben dieses Formulars löschen?")) {
        
        // 1. Nur Einträge dieses Namespaces aus dem LocalStorage entfernen
        Object.keys(localStorage).forEach(key => {
            if (key.startsWith(pageNamespace + "_")) {
                localStorage.removeItem(key);
            }
        });

        // 2. Alle relevanten Eingabefelder im Dokument finden
        const inputs = document.querySelectorAll('input, textarea');

        inputs.forEach(field => {
            // Schreibgeschützte Felder oder Datei-Upload überspringen
            if (field.readOnly || field.type === "file") return;

            // Feld im Browser leeren
            field.value = "";
        });

        //  Standard-Datum wieder setzen, falls gewünscht
        const dateField = document.getElementById('ort-datum');
        if (dateField) {
            const jetzt = new Date();
            const tag = String(jetzt.getDate()).padStart(2, '0');
            const monat = String(jetzt.getMonth() + 1).padStart(2, '0');
            const jahr = jetzt.getFullYear();
            
            const standardWert = `Regensburg / ${tag}.${monat}.${jahr}`;
            dateField.value = standardWert;
            saveToPageStorage('ort-datum', standardWert);
        }

				        // Standard-Wert für das Feld "B.Nr.:" setzen
        const bnrField = document.getElementById('bnrlabel');
        if (bnrField) {
            const standardBnr = "B.Nr.:";
            bnrField.value = standardBnr;
            saveToPageStorage('bnrlabel', standardBnr); 
        }
        
				        // Standard-Wert für das Feld "Kom.Nr.:" setzen
        const komField = document.getElementById('komnrlabel');
        if (komField) {
            const standardKom = "Kom.Nr.:";
            komField.value = standardKom;
            saveToPageStorage('komnrlabel', standardKom); 
        }
        
				        // Standard-Wert für das Feld "Koordinator:" setzen
        const kooField = document.getElementById('koordinatorlabel');
        if (kooField) {
            const standardKoo = "Koordinator:";
            kooField.value = standardKoo;
            saveToPageStorage('koordinatorlabel', standardKoo); 
        }
        
				        // Standard-Wert für das Feld "Tätigkeit:" setzen
        const taeField = document.getElementById('taetigkeit');
        if (taeField) {
            const standardTae = "Dämmen von Lüftungskanälen:";
            taeField.value = standardTae;
            saveToPageStorage('taetigkeit', standardTae); 
        }
    }
}


// 1. HILFSFUNKTION: Generiert den Dateinamen aus Feldern + Datum
function getGeneratedFileName() {
    const bau = document.getElementById('bauvorhaben').value.trim() || "Projekt";
    const ort = document.getElementById('leistungsort').value.trim() || "Ort";
    const jetzt = new Date();
    const datum = String(jetzt.getDate()).padStart(2, '0') + "-" + 
                  String(jetzt.getMonth() + 1).padStart(2, '0') + "-" + 
                  jetzt.getFullYear();
    
    return `LNZ-${bau}_${ort}_${datum}.lnz`.replace(/[/\\?%*:|"<>\s,]/g, '_');
}

async function saveAsLNZ() {
    let csvRows = [];
    const allInputs = document.querySelectorAll('input, textarea');

    allInputs.forEach(input => {
        // Ignoriere Felder ohne ID oder den File-Upload
        if (!input.id || input.id === "fileInput") return;
        
        // Direkter Zugriff auf den Wert (Numpad-Logik entfernt)
        let val = input.value;

        // CSV-Safe Formatierung
        let escaped = '"' + String(val).replace(/"/g, '""') + '"';
        csvRows.push(`${input.id};${escaped}`);
    });

    const csvContent = csvRows.join("\r\n");
    const fileName = getGeneratedFileName();

    // 1. Versuch: Moderner "Speichern unter"-Dialog
    if ('showSaveFilePicker' in window) {
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: fileName,
                types: [{
                    description: 'LNZ Datei',
                    accept: { 'application/octet-stream': ['.lnz'] }
                }],
            });
            const writable = await handle.createWritable();
            await writable.write(csvContent);
            await writable.close();
            return; 
        } catch (err) {
            console.log("Speichern abgebrochen oder Fehler:", err);
            if (err.name === 'AbortError') return;
        }
    }

    // 2. Fallback: Mobilgeräte & Safari
    const blob = new Blob([csvContent], { type: 'application/octet-stream' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
    URL.revokeObjectURL(link.href);
}

// 3. LADEN: Verarbeitet die Datei
function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const lines = e.target.result.split(/\r?\n/);

        lines.forEach(line => {
            if (!line.includes(';')) return;
            
            // Zerlegen der Zeile in ID und Wert
            const parts = line.split(';');
            const id = parts[0];
            // Entfernt die CSV-Anführungszeichen und stellt maskierte Anführungszeichen wieder her
            let value = parts.slice(1).join(';').replace(/^"|"$/g, '').replace(/""/g, '"');

const field = document.getElementById(id);
if (field) {
    field.value = value;
saveToPageStorage(id, value);
}
        });
        
        // Input zurücksetzen, damit dieselbe Datei erneut gewählt werden kann
        event.target.value = ""; 
    };
    reader.readAsText(file);
}

// Script für den Drucknamen
let originalTitle = document.title;

// Wird direkt VOR dem Öffnen des Druckfensters ausgeführt
window.addEventListener('beforeprint', () => {
    const lnzInput = document.getElementById('lnz');
    const lnzValue = lnzInput ? lnzInput.value : '';
    
    originalTitle = document.title; // Aktuellen Titel merken
    document.title = "Leistungsnachweis Nr-" + lnzValue;
});

// Wird direkt NACH dem Schließen (Drucken oder Abbrechen) ausgeführt
window.addEventListener('afterprint', () => {
    document.title = originalTitle; // Titel wieder zurücksetzen
});

// Erweiterte Navigation für die Tabelle (Pfeiltasten, Enter, Esc)
document.addEventListener('keydown', function(e) {
    const active = document.activeElement;
    if (!active || !active.classList.contains('input-haupttabelle')) return;

    // Aktuelle Position bestimmen (z. B. "a" und "1" aus "a1")
    const id = active.id;
    let rowChar = id.charAt(0);
    let colNum = parseInt(id.slice(1));

    let nextRowChar = rowChar;
    let nextColNum = colNum;

    // 1. ESC-Taste: Eingabe abbrechen / Feld verlassen
    if (e.key === 'Escape') {
        active.blur(); 
        return;
    }

    // 2. Tasten-Logik
    switch (e.key) {
        case 'ArrowUp':
            nextRowChar = String.fromCharCode(rowChar.charCodeAt(0) - 1);
            break;
        case 'ArrowDown':
        case 'Enter':
            e.preventDefault();
            nextRowChar = String.fromCharCode(rowChar.charCodeAt(0) + 1);
            break;
        case 'ArrowLeft':
            if (active.selectionStart === 0) {
                if (colNum > 1) {
                    nextColNum = colNum - 1;
                } else {
                    // Von Spalte 1 (z.B. b1) zurück in die vorherige Zeile Ende (a4)
                    nextRowChar = String.fromCharCode(rowChar.charCodeAt(0) - 1);
                    nextColNum = 4;
                }
            } else return;
            break;
        case 'ArrowRight':
            if (active.selectionEnd === active.value.length) {
                if (colNum < 4) {
                    nextColNum = colNum + 1;
                } else {
                    // Von Spalte 4 (z.B. a4) in die nächste Zeile Anfang (b1)
                    nextRowChar = String.fromCharCode(rowChar.charCodeAt(0) + 1);
                    nextColNum = 1;
                }
            } else return;
            break;
        default:
            return;
    }

    // Zielfeld suchen und Fokus setzen
    const nextId = nextRowChar + nextColNum;
    const nextField = document.getElementById(nextId);

    if (nextField) {
        e.preventDefault(); // Verhindert Cursor-Sprünge beim Zellenwechsel
        nextField.focus();
    }
});

// Funktion Schriftgröße automatisch anpassen
function getTextWidth(text, font) {
    const canvas = getTextWidth.canvas || (getTextWidth.canvas = document.createElement("canvas"));
    const context = canvas.getContext("2d");
    context.font = font;
    return context.measureText(text).width;
}

function adjustFontSize(el) {
    if (!el || !el.value) {
        // Wenn leer: Zurück auf Standard
        el.style.fontSize = (el.dataset.originalSize || "12") + "px";
        return;
    }

    // 1. Originalgröße einmalig merken
    if (!el.dataset.originalSize) {
        el.dataset.originalSize = parseFloat(window.getComputedStyle(el).fontSize) || 12;
    }

    let startSize = parseFloat(el.dataset.originalSize);
    let currentSize = startSize;
    
    // 2. Verfügbare Breite im Input (minus Padding)
    const style = window.getComputedStyle(el);
    const padding = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
    const availableWidth = el.clientWidth - padding - 5; // 5px Sicherheit

    if (availableWidth <= 0) return; // Verhindert Fehler beim Laden

    // 3. Schrift schrittweise verkleinern, bis der Text passt
    const fontFamily = style.fontFamily;
    const fontWeight = style.fontWeight;

    while (currentSize > 8) {
        const textWidth = getTextWidth(el.value, `${fontWeight} ${currentSize}px ${fontFamily}`);
        if (textWidth <= availableWidth) break;
        currentSize -= 0.5;
    }

    el.style.fontSize = currentSize + "px";
}

// Initialisierung
function initApp() {
    const inputs = document.querySelectorAll('.schrift-schrumpfen');
    inputs.forEach(el => {
        // Listener für jede Änderung
        el.addEventListener('input', () => adjustFontSize(el));
        // Einmal prüfen (für geladene Daten)
        setTimeout(() => adjustFontSize(el), 100);
    });
}

// Starten wenn alles bereit ist
if (document.readyState === 'loading') {
    window.addEventListener('load', initApp);
} else {
    initApp();
}



// 4. PWA DATEI-HANDLER & Service Worker immer unten im Script
if ('launchQueue' in window) {
    window.launchQueue.setConsumer(async (launchParams) => {
        if (launchParams.files.length > 0) {
            const file = await launchParams.files[0].getFile();
            const mockEvent = { target: { files: [file] } };
            handleFileSelect(mockEvent);
        }
    });
}




</script>
