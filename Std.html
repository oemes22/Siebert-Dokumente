<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --border: #000; --filter-bg: #f8f9fa; --row-height: 25.5px; --accent: #007bff; }
        @page { size: A4 portrait; margin: 0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background:#5895a8; font-size: 11px; display: flex; flex-direction: column; align-items: center; min-width: min-content; }
        .viewport-wrapper { width: 100%; overflow-x: auto; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .page { width: 210mm; height: 297mm; padding: 8mm 10mm; margin: 10px; background: white; box-shadow: 0 8px 24px rgba(0,0,0,0.2); box-sizing: border-box; display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden; position: relative; }
        
        /* Header */
        .header-box { display: flex; align-items: center; margin-bottom: 10px; border-bottom: 3px solid #333; padding-bottom: 8px; flex-shrink: 0; gap: 20px; }
        .logo-container { height: 85px; width: 85px; display: flex; justify-content: flex-start; align-items: center; flex-shrink: 0; }
        .header-center { flex-grow: 1; display: flex; flex-direction: column; gap: 2px; }
        .header-center label { font-weight: bold; font-size: 16px;		}
        .header-center input { border: none; border-bottom: 1px solid #ccc; font-size: 16px; font-weight: bold; outline: none; padding: 4px 0; width: 100%; background: transparent; }
        .header-right-stack { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; width: 120px; }
        .header-right-stack > div { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }

.fusszeile { 
    display: flex; 
    flex-direction: row; /* Blöcke nebeneinander */
    gap: 20px;           /* Abstand zwischen den Blöcken */
    align-items: flex-start;
    padding-top:30px;	
}

.fusszeile > div { 
    display: flex; 
    flex-direction: column; /* Input oben, Label unten */

}

.fusszeile input { 
    border: none; 
    font-size: 12px; 
    font-weight: bold; 
    outline: none; 
    text-align: center;

.fusszeile label {

    color: #555; 
    text-align: center;

}


        /* Tabelle */
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f2f2f2; border: 1px solid var(--border); padding: 1px; font-size: 9.5px; height: 16px; text-align: center; }
        td { 
  border: 1px solid var(--border); 
  height: var(--row-height); 
  min-height: var(--row-height);
  max-height: var(--row-height); /* Erzwingt die Höhe */
  position: relative; 
  overflow: hidden; /* Schneidet alles ab, was übersteht */
  white-space: nowrap; /* Verhindert Zeilenumbrüche, die die Zelle dehnen */
  box-sizing: border-box;
}
        .filter-row { background: var(--filter-bg); height: 30px; }
        .filter-input { width: 100%; height: 100%; border: none; font-size: 11px; text-align: center; background: transparent; outline: none; cursor: pointer; appearance: auto; }
        
        .cell, .cell-text { width: 100%; height: 100%; border: none; padding: 0; margin: 0; font-size: 10.5px; outline: none; background: transparent; display: block; position: absolute; top: 0; left: 0; text-align: center; }
        textarea.cell-text { resize: none; overflow: hidden; text-align: left; padding: 3px 5px; white-space: pre-wrap; line-height: 1.1; }
        .cell-check { cursor: pointer; width: 16px; height: 16px; margin-top: 5px; }

        /* Container für das SVG in der Tabelle */
.form-display-container { 
  position: absolute; /* Nimmt das Bild aus dem normalen Fluss */
  top: 0; 
  left: 0; 
  right: 0; 
  bottom: 0;
  display: flex; 
  align-items: center; 
  justify-content: center; 
  overflow: hidden;
}

.form-display-container svg { 
    width: 90%;
    height: 90%;
    display: block;
}

        .notes-container { margin-top: 8px; flex-shrink: 0;}
        .notes-container label { font-weight: bold; font-size: 9px; color: #555; text-transform: uppercase; display: block; margin-bottom: 2px; }
        #general_notes { width: 100%; height: 38px; border: 1px solid #ccc; padding: 4px; font-family: inherit; font-size: 11px; resize: none; outline: none; box-sizing: border-box; background: #fafafa; overflow: hidden; }

        /* Modal */
        .form-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .form-modal-content { background: white; margin: 5% auto; padding: 20px; width: 320px; border-radius: 8px; text-align: center; }
        .img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .img-grid div { border: 1px solid #ccc; padding: 5px; cursor: pointer; border-radius: 4px; background: #fff; display: flex; align-items: center; justify-content: center; min-height: 50px; }
        .img-grid svg { width: 100%; height: auto; max-height: 40px; }

        .controls { width: 100%; max-width: 210mm; display: flex; justify-content: center; gap: 10px; padding: 15px 0 30px 0; }
        button { padding: 8px 16px; cursor: pointer; background: #fff; border: 2px solid #ccc; border-radius: 12px; font-weight: bold;}
        .btn-neu {padding: 8px 16px; cursor: pointer; background: #fff; border: 2px solid #ff0000; border-radius: 12px; font-weight: bold; width: 20%; font-size: 0.8rem; }

        @media print { 
            body { background: none; } .viewport-wrapper { display: block; min-height: auto; }
            .page { box-shadow: none; margin: 0; width: 210mm; height: 297mm; padding: 8mm 10mm; } 
            .col-st, .controls, .filter-row, .form-modal { display: none !important; } 
            #general_notes { background: none; border-color: #000; height: 38px; }
        }
		input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

/* Entfernt die Pfeile in Firefox */
input[type=number] {
  -moz-appearance: textfield;
}

/* Optional: Verhindert das Scrollen des Seiteninhalts bei Pfeiltasten */
.cell:focus {
  outline: 2px solid var(--accent);
  background: #fff;
}
/* Markiert die aktuell ausgewählte Zelle hellblau */
.cell:focus, .cell-text:focus { 
    background-color: #e7f3ff !important; 
    outline: 2px solid #007bff; 
    z-index: 10; 
}

/* Markiert die gesamte Zeile, wenn eine Zelle darin fokussiert wird */
#tb tr:focus-within {
    background-color: rgba(235, 222, 52, 0.4); 
}


.logo {
    width: 75px;
    height: auto;
    display: block;
    min-width: 65px;
}

    </style>
</head>
<body onload="initTable()">

<div class="viewport-wrapper">
    <div class="page">
        <div class="header-box">
            <div class="logo-container">
                <a href="index.html">
                <img src="Logo.svg" alt="Firmenlogo" class="logo">
                </a>
            </div>
            <div class="header-center">
                <label>Stundennachweis Siebert-Isolierungen</label>
            </div>
            <div class="header-right-stack">
                <div><label>Name:</label><input type="text" id="name" list="list_name" oninput="sync()"></div>
<div>
  <label>Monat/Jahr</label>
  <input inputMode="decimal" type="text" id="m_j" placeholder="MM.YYYY" oninput="sync(); fillDays()">
</div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th class="tag" style="width: 8%;">Tag</th>
                        <th class="beginn" style="width: 10%;">Beginn</th>

                <tbody id="tb"></tbody>
				<!--Fußzeile für die Summe -->
<tfoot>
  <tr style="background: #f2f2f2; font-weight: bold; border-top: 2px solid #333;">
    <td colspan="4" style="text-align: right; padding-right: 10px; border: none;">Gesamtstunden:</td>

        <input type="text" id="gesamt_stunden" readonly 
               style="width: 100%; border: none; background: transparent; font-weight: bold; text-align: center; font-size: 11px;">

  </tr>
</tfoot>
        </table>

        <div class="notes-container">
		<table>
		     <td style="width: 85%; border: none; padding-right: 15px">   
            <label>Zusätzliche Anmerkungen</label>
            <textarea id="general_notes" placeholder="..." oninput="sync()"></textarea>
			</td>
			
			<td style="width:  2%; border: none; text-align: right; font-size:1.2rem; background-color: #cdf3fa;font-weight: bold;" >*</td>
			<td style="width:  3%; border: none; text-align: right; font-size:0.6rem; background-color: #cdf3fa;font-weight: bold;" >F<br>U<br>K<br>KKR</td>
			<td style="width: 10%; border: none; font-size:0.6rem; background-color: #cdf3fa;" >&nbsp Feiertag<br>&nbsp Urlaub<br>&nbsp Krank<br>&nbsp Kind krank</td>
		</table>
		
        </div>
		
		 <div class="fusszeile">
            <div style="width: 15%"><label>Datum:</label><input type="date" id="datum_an" oninput="sync()"></div>
<div style="display: inline-flex; flex-direction: column; width: 35%; vertical-align: baseline; cursor: pointer;" onclick="document.getElementById('unterschrift_an').click()">
    
    <!-- Der Bereich über der Linie -->
    <div style="border-bottom: 1px solid #ccc; height: 20px; display: flex; align-items: flex-end; justify-content: center; position: relative;">
        <!-- Das Bild schwebt über der Linie, ohne die Höhe zu verändern -->
        <img id="vorschau_an" src="" style="display: none; max-height: 45px; position: absolute; bottom: 2px; pointer-events: none;">
        <span id="platzhalter_an" style="color: #ccc; font-size: 8px; margin-bottom: 2px;">Klicken</span>
    </div>

    <!-- Verstecktes Input -->
    <input type="file" id="unterschrift_an" accept="image/*" onchange="ladeUnterschrift(this)" style="display: none;">
    
    <!-- Das Label direkt darunter -->
    <label style="font-weight: bold; font-size: 9px; color: #555; text-align: center; margin-top: 4px;">
        Unterschrift Arbeitnehmer:
    </label>
</div>
			
			<div style="width: 15%"><label>Datum:</label><input type="text" id="datum_ag" readonly></div>
			<div style="width: 35%"><label>Unterschrift Arbeitgeber:</label><input type="text" id="unterschrift_ag" readonly></div>
        </div>
		
		
    </div>

    <div class="controls">
		<button onclick="standardStundenFuellen()">⏱ Standard-Stunden</button>
        <button onclick="exportCSV()">💾 Speichern</button>
        <button onclick="document.getElementById('fileInput').click()">📂 Laden</button>
        <button onclick="window.print()">🖨️ Export</button>
        <button class="btn-neu" onclick="clearTable()">🗑️ Neu</button>
		<input type="file" id="fileInput" accept=".stdz" style="display:none" onchange="importCSV(this)">
		
    </div>
</div>


<script>
// 1. Eindeutiger Name für dieses Formular
const pageNamespace = "stundenzettel";

const ROWS = 31;
// Spaltennamen exakt wie in deinem HTML/CSS definiert
const COLS = ['tag', 'beginn', 'pause', 'ende', 'dauer', 'sternchen', 'bemerkungen'];

function initTable() {
    const tb = document.getElementById('tb');
    tb.innerHTML = '';

    for (let i = 1; i <= ROWS; i++) {
        let tr = document.createElement('tr');
        COLS.forEach(c => {
            let td = document.createElement('td');
            td.className = `col-${c}`;

            let input = document.createElement('input');
            input.type = 'text'; // Bleibt text für die Formatierungshilfen
            input.className = 'cell';
            input.id = `r${i}_${c}`;

            // NEU: Numerische Tastatur für Zeit- und Stundenfelder erzwingen
            const numerischeSpalten = ['beginn', 'pause', 'ende', 'dauer'];
            if (numerischeSpalten.includes(c)) {
                input.inputMode = 'decimal'; 
            }

            // Standard: Bei jeder Eingabe synchronisieren
            input.oninput = sync;

            // --- SPEZIELLE LOGIK PRO SPALTE ---
            if (c === 'tag') {
                input.readOnly = true;
            }
            else if (c === 'beginn' || c === 'ende') {
                input.addEventListener('blur', function() { formatInput(this, 'time'); });
            }
            else if (c === 'dauer' || c === 'pause') {
                input.addEventListener('blur', function() { formatInput(this, 'hours'); });
            }
            else if (c === 'sternchen') {
                input.setAttribute('list', 'list_sternchen');
                input.oninput = function() {
                    checkSternchen(i);
                    sync();
                };
            }
            else if (c === 'bemerkungen') {
                input.setAttribute('list', 'list_orte');
            }

            td.appendChild(input);
            tr.appendChild(td);
        });
        tb.appendChild(tr);
    }
    load(); // Vorhandene Daten nach dem Erstellen laden
}



// Hilfsfunktion für die automatische Formatierung
function formatInput(el, type) {
    let val = el.value.trim();
    if (!val) return;

    if (type === 'time') {
        let digits = val.replace(/[^0-9]/g, '');
        if (digits.length === 3) digits = "0" + digits;
        if (digits.length === 4) {
            let hh = digits.substring(0, 2);
            let mm = digits.substring(2, 4);
            if (parseInt(hh) < 24 && parseInt(mm) < 60) {
                el.value = hh + ":" + mm;
            }
        }
    } 
    else if (type === 'hours') {
        let num = val.replace(',', '.').replace(' h', '').trim();
        if (!isNaN(num) && num !== "") {
            el.value = num + " h";
        }
    }
    
    sync(); 
}


// Hilfsfunktion für die automatische Formatierung beim Verlassen (Blur)
function formatInput(el, type) {
    let val = el.value.trim();
    if (!val) return;

    if (type === 'time') {
        // Entferne alles außer Zahlen
        let digits = val.replace(/[^0-9]/g, '');
        
        // Ergänze führende Null bei 3 Stellen (z.B. 700 -> 0700)
        if (digits.length === 3) digits = "0" + digits;
        
        if (digits.length === 4) {
            let hh = digits.substring(0, 2);
            let mm = digits.substring(2, 4);
            // Nur gültige Zeiten zulassen
            if (parseInt(hh) < 24 && parseInt(mm) < 60) {
                el.value = hh + ":" + mm;
            }
        }
    } 
    else if (type === 'hours') {
        // Ersetze Komma durch Punkt und entferne "h", falls schon vorhanden
        let num = val.replace(',', '.').replace(' h', '').trim();
        if (!isNaN(num) && num !== "") {
            el.value = num + " h";
        }
    }
    
    sync(); // Daten im Speicher aktualisieren
}


function sync() {
    const d = {
        p: document.getElementById('name').value,
        n: document.getElementById('m_j').value,
        gn: document.getElementById('general_notes').value,
        dan: document.getElementById('datum_an').value,
        rs: {}
    };

    let gesamtStunden = 0;
    
    // NEU: Set mit DEINEN VORDEFINIERTEN WERTEN starten
    let bemerkungenSet = new Set(["Regensburg", "Aumovio", "Schaeffler", "Siemens", "Osram", "MR", "Werkstatt"]); 

    for (let i = 1; i <= ROWS; i++) {
        d.rs[i] = COLS.map(c => {
            const el = document.getElementById(`r${i}_${c}`);
            const val = el ? el.value.trim() : "";

            if (c === 'dauer' && val) {
                let num = parseFloat(val.replace(',', '.').replace(' h', ''));
                if (!isNaN(num)) gesamtStunden += num;
            }

            // NEU: Getippte Bemerkungen zum Set hinzufügen
            if (c === 'bemerkungen' && val !== "") {
                bemerkungenSet.add(val);
            }

            return val;
        });
    }

    const summenFeld = document.getElementById('gesamt_stunden');
    if (summenFeld) {
        summenFeld.value = gesamtStunden.toFixed(1).replace('.', ',') + " h";
    }

    // Die Liste im HTML mit allen Werten (fest + neu) füllen
    updateDatalistOrte(bemerkungenSet);

    localStorage.setItem(pageNamespace + '_data', JSON.stringify(d));
}

function updateDatalistOrte(set) {
    const dl = document.getElementById('list_orte');
    if (!dl) return;
    
    dl.innerHTML = ''; // Liste leeren
    set.forEach(text => {
        let opt = document.createElement('option');
        opt.value = text;
        dl.appendChild(opt);
    });
}




function load() {
    const s = localStorage.getItem(pageNamespace + '_data');
    if(!s) return;
    const d = JSON.parse(s);
    document.getElementById('name').value = d.p || "";
    document.getElementById('m_j').value = d.n || "";
    document.getElementById('general_notes').value = d.gn || "";
	document.getElementById('datum_an').value = d.dan || "";
    for(let i=1; i<=ROWS; i++) {
        if(d.rs && d.rs[i]) {
            COLS.forEach((c, j) => {
                const el = document.getElementById(`r${i}_${c}`);
                if(el) {
                    el.value = d.rs[i][j] || "";
                }
            });
        }
    }
	 sync();
}

function getGeneratedFileName() {
    const name = document.getElementById('name').value.trim() || "Unbeznnt";
    const monat = document.getElementById('m_j').value.trim() || "Monat";
    return `Stundenzettel-${name}-${monat}.stdz`.replace(/[/\\?%*:|" <>\s,]/g, '_');
}

async function exportCSV() {
    // Bestehende IDs aus dem Dokument verwenden
    const name = document.getElementById('name').value;
    const monat = document.getElementById('m_j').value;
	const datuman = document.getElementById('datum_an').value;
    const notes = document.getElementById('general_notes').value.replace(/\n/g, '[BR]').replace(/;/g, ',');
    
    // Kopfzeile erstellen (Format bleibt wie im Original-PDF)
    let txt = `Stundenzettel|${name}|${monat}|${notes}|${datuman}\n`;

    
    // Tabellendaten sammeln (Alle Felder sind jetzt Text-Inputs)
    for(let i=1; i<=ROWS; i++) {
        txt += COLS.map(c => {
            const el = document.getElementById(`r${i}_${c}`);
            // Einfacher Textwert ohne Checkbox-Prüfung
            const val = el ? el.value : "";
            return val.toString().replace(/;/g, ',');
        }).join(';') + "\n";
    }

    const fileName = getGeneratedFileName();

    // File System Access API (Moderner Dialog)
    if ('showSaveFilePicker' in window) {
        try {
            const handle = await window.showSaveFilePicker({
                suggestedName: fileName,
                types: [{
                    description: 'Stundenzettel Datei',
                    accept: { 'application/octet-stream': ['.stdz'] },
                }],
            });
            const writable = await handle.createWritable();
            await writable.write(txt);
            await writable.close();
        } catch (err) {
            console.info("Speichervorgang abgebrochen.");
        }
    } else {
        // Fallback für Browser, die den FilePicker nicht unterstützen
        const b = new Blob([txt], { type: 'text/plain' });
        const a = document.createElement('a');
        a.download = fileName;
        a.href = window.URL.createObjectURL(b);
        a.click();
        window.URL.revokeObjectURL(a.href);
    }
}



function importCSV(input) {
    if(!input.files.length) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const lines = e.target.result.split('\n');
        
        // Metadaten (Kopfzeile) verarbeiten
        if(lines[0].startsWith('Stundenzettel')) {
            const meta = lines[0].split('|');
            document.getElementById('name').value = meta[1] || "";
            document.getElementById('m_j').value = meta[2] || "";
            document.getElementById('general_notes').value = (meta[3] || "").replace(/\[BR\]/g, '\n');
			document.getElementById('datum_an').value = meta[4] || "";
        }

        // Tabellenzeilen verarbeiten
        for(let i = 1; i <= ROWS; i++) {
            if(lines[i]) {
                const vals = lines[i].split(';');
                COLS.forEach((c, j) => {
                    const el = document.getElementById(`r${i}_${c}`);
                    if(el) {
                        
                        el.value = vals[j] || ""; 
                    }
                });
            }
        }
        sync(); // Daten im LocalStorage aktualisieren
    };
    reader.readAsText(input.files[0]);
}


function clearTable() {
    if(confirm("Möchten Sie alle Eingaben dieses Formulars löschen?")) {
        localStorage.removeItem(pageNamespace + '_data');
        location.reload();
    }
}

// Navigation und Event-Listener
window.addEventListener('keydown', function(e) {
    const active = document.activeElement;
    if (!active || !active.id) return;
    const match = active.id.match(/^r(\d+)_(\w+)$/);
    if (match) {
        let row = parseInt(match[1]);
        const col = match[2];
        const colIdx = COLS.indexOf(col);
        
        switch(e.key) {
            case 'ArrowUp': if (row > 1) focusCell(row - 1, col); break;
            case 'ArrowDown': if (row < ROWS) focusCell(row + 1, col); break;
            case 'Enter': 
                e.preventDefault(); 
                if (row < ROWS) focusCell(row + 1, col); 
                break;
        }
    }
}, true);

function focusCell(r, c) {
    const el = document.getElementById(`r${r}_${c}`);
    if (el) {
        el.focus();
        if (typeof el.select === 'function') el.select();
    }
}

function ladeUnterschrift(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = document.getElementById('vorschau_an');
            img.src = e.target.result;
            img.style.display = 'block';
            document.getElementById('platzhalter_an').style.display = 'none';
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function fillDays() {
    const monthYear = document.getElementById('m_j').value;
    const parts = monthYear.split('.');
    
    // Nur ausführen, wenn genau MM.YYYY eingegeben wurde (7 Zeichen, z.B. 03.2026)
    if (parts.length !== 2 || parts[0].length !== 2 || parts[1].length !== 4) {
        return; 
    }

    const month = parseInt(parts[0], 10);
    const year = parseInt(parts[1], 10);
    
    // Validitätsprüfung für Monat
    if (isNaN(month) || isNaN(year) || month < 1 || month > 12) return;

    const weekdays = ["So", "Mo", "Di", "Mi", "Do", "Fr", "Sa"];
    const lastDay = new Date(year, month, 0).getDate();

    for (let i = 1; i <= 31; i++) {
        const cell = document.getElementById(`r${i}_tag`);
        if (cell) {
            if (i <= lastDay) {
                const dateObj = new Date(year, month - 1, i);
                const dayName = weekdays[dateObj.getDay()];
                const dayNum = i < 10 ? '0' + i : i;
                const monthNum = month < 10 ? '0' + month : month;
                cell.value = `${dayName}, ${dayNum}.${monthNum}.`;
            } else {
                cell.value = ""; // Felder leeren, wenn Monat kürzer als 31 Tage
            }
        }
    }
    sync(); // Speichert die automatisch generierten Tage im LocalStorage
}

function standardStundenFuellen() {
    for (let i = 1; i <= ROWS; i++) {
        const tagCell = document.getElementById(`r${i}_tag`);
        const sternchenCell = document.getElementById(`r${i}_sternchen`);
        
        if (!tagCell || !tagCell.value) continue;

        const tagText = tagCell.value;
        const hatSternchen = sternchenCell && sternchenCell.value.trim() !== "";

        // Felder referenzieren
        const beginn = document.getElementById(`r${i}_beginn`);
        const pause = document.getElementById(`r${i}_pause`);
        const ende = document.getElementById(`r${i}_ende`);
        const dauer = document.getElementById(`r${i}_dauer`);

        // Falls Samstag, Sonntag oder ein Sternchen vorhanden ist -> Felder leeren
        if (tagText.startsWith("Sa") || tagText.startsWith("So") || hatSternchen) {
            beginn.value = "";
            pause.value = "";
            ende.value = "";
            dauer.value = "";
        } 
        // Montag bis Donnerstag
        else if (tagText.startsWith("Mo") || tagText.startsWith("Di") || tagText.startsWith("Mi") || tagText.startsWith("Do")) {
            beginn.value = "07:00";
            pause.value = "1 h";
            ende.value = "16:30";
            dauer.value = "8.5 h";
        } 
        // Freitag
        else if (tagText.startsWith("Fr")) {
            beginn.value = "07:00";
            pause.value = "0.5 h";
            ende.value = "13:30";
            dauer.value = "6.0 h";
        }
    }
    sync(); // Speichert die neuen Werte direkt im LocalStorage
}

function checkSternchen(rowIdx) {
    const sternchenVal = document.getElementById(`r${rowIdx}_sternchen`).value.trim();
    
    // Wenn das Feld NICHT leer ist, werden die Zeitfelder geleert
    if (sternchenVal !== "") {
        document.getElementById(`r${rowIdx}_beginn`).value = "";
        document.getElementById(`r${rowIdx}_pause`).value = "";
        document.getElementById(`r${rowIdx}_ende`).value = "";
        document.getElementById(`r${rowIdx}_dauer`).value = "";
        
        // Speichert die Änderung sofort im LocalStorage
        sync(); 
    }
}


</script>
